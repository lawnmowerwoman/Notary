name: Documentation
description: Verbesserungen an Readme, Roadmap, Betriebsdoku oder Entwicklerdokumentation.
title: "[Docs]: "
labels:
  - documentation
body:
  - type: textarea
    id: gap
    attributes:
      label: Dokumentationslücke
      description: Was fehlt oder ist unklar?
    validations:
      required: true
  - type: textarea
    id: target
    attributes:
      label: Zielzustand
      description: Welche Information soll wo ergänzt oder überarbeitet werden?
    validations:
      required: true
  - type: textarea
    id: notes
    attributes:
      label: Zusätzliche Hinweise
      description: Relevante Dateien, Screenshots, Beispielkonfigurationen oder offene Fragen.
